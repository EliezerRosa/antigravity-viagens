<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Painel inteligente de viagem Brasil com busca de voos e hotéis em 8+ serviços gratuitos e análise IA Gemini Pro">
  <meta name="theme-color" content="#D4875C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Viagem Brasil">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>🗺️ Painel de Viagem — PWA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="sub">Roteiro Brasil · Jun–Jul 2026</div>
  <h1>🗺️ Painel de Viagem</h1>
  <div class="route-chips" id="route-chips"></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn undo" id="btn-undo-import" onclick="renderUndoModal()" style="display:none;background:rgba(212,135,92,0.15);border:1px solid rgba(212,135,92,0.4);color:#D4875C">⏪ Desfazer</button>
  <button class="tool-btn export" onclick="exportData()">⬇ Exportar</button>
  <button class="tool-btn import" onclick="importData()">⬆ Importar</button>
  <button class="tool-btn reset"  onclick="resetData()">🗑 Limpar</button>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">✈️ Voos</button>
  <button class="tab-btn" onclick="switchTab(1)">🏨 Hotéis</button>
  <button class="tab-btn" onclick="switchTab(2)">🥗 Refeições</button>
  <button class="tab-btn" onclick="switchTab(3)">💰 Despesas</button>
  <button class="tab-btn" onclick="switchTab(4)">🤖 Assistente IA</button>
</div>

<div id="content"></div>

<!-- PWA Install Banner -->
<div id="install-banner">📲 Instalar como App</div>

<!-- Scripts -->
<script src="app-data.js"></script>
<script src="app-render.js"></script>
<script src="app-ai.js"></script>

</body>
</html>
